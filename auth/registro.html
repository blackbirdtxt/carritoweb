<!DOCTYPE html>
<html>

<head>
<title>Registro</title>
<link rel="stylesheet" href="../css/styles.css">

<script type="module">

import { registrar } from "../js/auth.js";

window.reg = async () => {

let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

try{

await registrar(email,pass);

document.getElementById("mensajeRegistro").style.display="block";

setTimeout(()=>{
window.location="login.html";
},2000);

}catch(error){

alert("Error: "+error.message);

}

}

</script>

</head>

<body>

<div class="container">

<h2>Registro</h2>

<input id="email" placeholder="email"><br><br>

<input id="pass" type="password" placeholder="password"><br><br>

<button onclick="reg()">Crear cuenta</button>

<br><br>

<div id="mensajeRegistro" style="display:none;color:green;">
Registro exitoso. Redirigiendo al login...
</div>

<br>

<p>¿Ya tienes cuenta?</p>
<a href="login.html">Iniciar sesión</a>

</div>

</body>
</html>
